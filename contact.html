<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Aether Power Labs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fff; font-family: 'Inter', sans-serif; color: #1d1d1f; }
        .container { max-width: 800px; margin: 0 auto; padding: 80px 40px; }
        h1 { font-size: 40px; margin-bottom: 20px; text-align: center; }
        p { text-align: center; color: #86868b; margin-bottom: 50px; }
        .contact-form { background: #fbfbfd; padding: 40px; border-radius: 20px; border: 1px solid #d2d2d7; }
        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; color: #1d1d1f; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 8px; font-family: inherit; font-size: 16px; }
        textarea { height: 120px; resize: vertical; }
        .submit-btn { background: #0071e3; color: #fff; border: none; padding: 14px 28px; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.3s; }
        .submit-btn:hover { background: #0077ed; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Contact Us</h1>
        <p>Leave a message and our team will get back to you within 24 hours.</p>
        <form class="contact-form">
            <div class="form-group">
                <label>Name / Company Name</label>
                <input type="text" placeholder="Your Name or Company" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Requirements</label>
                <textarea placeholder="Tell us about your needs..."></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </div>
</body>
</html>
