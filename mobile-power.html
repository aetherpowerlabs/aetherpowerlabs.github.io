<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Power | Aether Power Labs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* 样式与 Glasses 页面保持 100% 一致 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { background: #fff; color: #1d1d1f; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
        header { height: 80px; display: flex; align-items: center; border-bottom: 1px solid #f5f5f7; position: sticky; top: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(15px); z-index: 100; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .logo-link { text-decoration: none; color: #000; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
        .logo span { color: #0071e3; }
        .main-nav { display: flex; gap: 40px; align-items: center; }
        .nav-link { color: #86868b; text-decoration: none; font-size: 14px; font-weight: 500; transition: 0.2s; }
        .nav-link:hover { color: #000; }
        .product-hero { padding: 100px 0; display: grid; grid-template-columns: 1.3fr 1fr; gap: 80px; align-items: start; }
        .product-image img { width: 100%; border-radius: 20px; border: 1px solid #f0f0f0; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .product-info h1 { font-size: 48px; font-weight: 700; margin-bottom: 24px; letter-spacing: -1.2px; color: #000; }
        .product-info p { color: #424245; font-size: 18px; margin-bottom: 40px; line-height: 1.6; }
        .spec-item { display: flex; justify-content: space-between; padding: 18px 0; border-bottom: 1px solid #f5f5f7; font-size: 14px; }
        .spec-label { color: #86868b; font-weight: 400; }
        .spec-value { font-weight: 600; color: #1d1d1f; }
        .cta-link { display: inline-block; margin-top: 48px; color: #0071e3; text-decoration: none; font-weight: 600; font-size: 17px; }
        footer { padding: 60px 0; text-align: center; color: #86868b; border-top: 1px solid #f5f5f7; font-size: 12px; }
    </style>
</head>
<body>
    <header>
        <div class="container header-flex">
            <a href="/" class="logo-link"><div class="logo">Aether<span>Power</span> Labs</div></a>
            <nav class="main-nav">
                <a href="about" class="nav-link">About Us</a>
                <a href="/#product" class="nav-link">Product</a>
                <a href="contact" class="nav-link">Contact</a>
            </nav>
        </div>
    </header>
    <main class="container">
        <section class="product-hero">
            <div class="product-image"><img src="assets/images/mobile-power.jpg" alt="Mobile Power" loading="lazy"></div>
            <div class="product-info">
                <h1>Mobile Power</h1>
                <p>High-capacity portable energy solutions with military-grade fast charging technology.</p>
                <div class="specs">
                    <div class="spec-item"><span class="spec-label">Capacity</span><span class="spec-value">2048Wh</span></div>
                    <div class="spec-item"><span class="spec-label">Fast Charge</span><span class="spec-value">100W PD</span></div>
                </div>
                <a href="contact" class="cta-link">Send Inquiry</a>
            </div>
        </section>
    </main>
    <footer>© 2026 Aether Power Labs. All rights reserved.</footer>
</body>
</html>
