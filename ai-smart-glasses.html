<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Aether Power Labs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fff; color: #000; font-family: -apple-system, sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
        header { height: 80px; display: flex; align-items: center; border-bottom: 1px solid #f5f5f7; sticky; top: 0; background: #fff; z-index: 100; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .logo-link { text-decoration: none; color: #000; font-size: 22px; font-weight: 700; }
        .logo span { color: #0071e3; }
        .main-nav { display: flex; gap: 30px; }
        .nav-link { color: #86868b; text-decoration: none; font-size: 14px; }
        .btn-contact { color: #0071e3; text-decoration: none; font-weight: 600; font-size: 14px; }
        
        /* 放大图片：1.3fr 1fr */
        .product-hero { padding: 80px 0; display: grid; grid-template-columns: 1.3fr 1fr; gap: 80px; align-items: start; }
        .product-image img { width: 100%; border-radius: 20px; border: 1px solid #f0f0f0; }
        .product-info h1 { font-size: 48px; margin-bottom: 25px; letter-spacing: -1px; }
        .product-info p { color: #424245; font-size: 18px; margin-bottom: 40px; line-height: 1.6; }
        .spec-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #f5f5f7; font-size: 14px; }
        .spec-label { color: #86868b; }
        .spec-value { font-weight: 600; }
        
        /* 统一按钮文字 */
        .cta-link { display: inline-block; margin-top: 40px; color: #0071e3; text-decoration: none; font-weight: 600; font-size: 18px; }
        footer { padding: 60px 0; text-align: center; color: #86868b; border-top: 1px solid #f5f5f7; font-size: 12px; }
    </style>
</head>
<body>
    <header>
        <div class="container header-flex">
            <a href="/" class="logo-link"><div class="logo">Aether<span>Power</span> Labs</div></a>
            <nav class="main-nav">
                <a href="about.html" class="nav-link">About Us</a>
                <a href="/#products-section" class="nav-link">Product</a>
                <a href="mailto:demi@aetherpowerlabs.com" class="btn-contact">Contact</a>
            </nav>
        </div>
    </header>
    <main class="container">
        <section class="product-hero">
            <div class="product-image"><img src="assets/images/ai-glasses.jpg"></div>
            <div class="product-info">
                <h1>AI Smart Glasses</h1>
                <p>Leading-edge optical solutions for the future of AR.</p>
                <div class="specs">
                    <div class="spec-item"><span class="spec-label">Feature</span><span class="spec-value">Waveguide Optics</span></div>
                </div>
                <a href="mailto:demi@aetherpowerlabs.com" class="cta-link">Send Inquiry →</a>
            </div>
        </section>
    </main>
    <footer>© 2026 Aether Power Labs.</footer>
</body>
</html>
